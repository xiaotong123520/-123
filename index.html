<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人日记本 - GitHub版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📓</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --success: #2ecc71;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --border: #bdc3c7;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            --radius: 10px;
        }
        
        [data-theme="dark"] {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --light: #0f3460;
            --dark: #e6e6e6;
            --border: #2d4059;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        
        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部样式 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo i {
            font-size: 2.5rem;
            color: var(--secondary);
        }
        
        .logo h1 {
            color: var(--primary);
            font-size: 2.2rem;
        }
        
        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        /* 主题切换器 */
        .theme-switch {
            position: relative;
            width: 60px;
            height: 30px;
        }
        
        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--primary);
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "🌙";
            display: flex;
            align-items: center;
            justify-content: center;
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: var(--secondary);
        }
        
        input:checked + .slider:before {
            content: "☀️";
            transform: translateX(30px);
        }
        
        /* 主内容区域 */
        .app-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            min-height: 80vh;
        }
        
        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }
        
        /* 面板通用样式 */
        .panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        [data-theme="dark"] .panel {
            background: rgba(30, 30, 46, 0.9);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }
        
        .panel-header h2 {
            color: var(--primary);
            font-size: 1.5rem;
        }
        
        /* 日记列表 */
        .diary-list-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 25px;
            font-size: 1rem;
            background: var(--light);
            color: var(--dark);
        }
        
        .diary-list {
            flex: 1;
            overflow-y: auto;
            max-height: 500px;
        }
        
        .diary-item {
            padding: 15px;
            margin-bottom: 10px;
            background: var(--light);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        
        .diary-item:hover {
            transform: translateX(5px);
            border-left-color: var(--secondary);
        }
        
        .diary-item.active {
            background: var(--secondary);
            color: white;
        }
        
        .diary-date {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        
        .diary-preview {
            font-size: 0.9rem;
            opacity: 0.8;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* 编辑器区域 */
        .editor-container {
            display: flex;
            flex-direction: column;
        }
        
        .date-input {
            padding: 8px 15px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            background: var(--light);
            color: var(--dark);
        }
        
        .editor-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .editor-textarea {
            flex: 1;
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            background: var(--light);
            color: var(--dark);
        }
        
        /* 图片上传 */
        .image-upload-area {
            border: 3px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.5);
        }
        
        .image-upload-area:hover {
            border-color: var(--secondary);
            background: rgba(52, 152, 219, 0.1);
        }
        
        .image-upload-area i {
            font-size: 3rem;
            color: var(--secondary);
            margin-bottom: 15px;
        }
        
        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .image-preview-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
        }
        
        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(231, 76, 60, 0.9);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        /* 按钮 */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--secondary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        
        .btn-danger {
            background: var(--accent);
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        /* 统计和导出 */
        .stats-export {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .stats {
            display: flex;
            gap: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--secondary);
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .toast.show {
            display: block;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .app-container {
                gap: 15px;
            }
            
            .panel {
                padding: 15px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <h1>我的数字日记本</h1>
            </div>
            <div class="header-controls">
                <label class="theme-switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
                <button class="btn btn-primary" id="export-btn">
                    <i class="fas fa-download"></i> 导出数据
                </button>
            </div>
        </header>
        
        <main class="app-container">
            <!-- 左侧：日记列表 -->
            <section class="panel diary-list-container">
                <div class="panel-header">
                    <h2><i class="fas fa-list"></i> 日记列表</h2>
                    <span id="diary-count">0篇</span>
                </div>
                
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索日记...">
                </div>
                
                <div class="diary-list" id="diary-list">
                    <!-- 日记列表动态生成 -->
                </div>
            </section>
            
            <!-- 右侧：编辑器 -->
            <section class="panel editor-container">
                <div class="panel-header">
                    <h2 id="editor-title"><i class="fas fa-edit"></i> 写日记</h2>
                    <input type="date" id="date-input" class="date-input">
                </div>
                
                <div class="editor-content">
                    <textarea id="diary-text" class="editor-textarea" placeholder="写下您的想法、经历和感受..."></textarea>
                    
                    <div class="image-upload-area" id="image-upload-area">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <h3>点击或拖拽图片上传</h3>
                        <p>支持JPG、PNG、GIF格式，单张图片最大5MB</p>
                        <input type="file" id="image-input" accept="image/*" multiple style="display: none;">
                    </div>
                    
                    <div class="image-preview-grid" id="image-preview">
                        <!-- 图片预览动态生成 -->
                    </div>
                </div>
                
                <div class="controls">
                    <button id="clear-btn" class="btn btn-secondary">
                        <i class="fas fa-eraser"></i> 清空
                    </button>
                    <button id="delete-btn" class="btn btn-danger" style="display: none;">
                        <i class="fas fa-trash"></i> 删除日记
                    </button>
                    <button id="save-btn" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存日记
                    </button>
                </div>
            </section>
        </main>
        
        <div class="stats-export">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-diaries">0</div>
                    <div class="stat-label">总日记数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="total-images">0</div>
                    <div class="stat-label">总图片数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="total-words">0</div>
                    <div class="stat-label">总字数</div>
                </div>
            </div>
            
            <div>
                <button id="import-btn" class="btn btn-secondary">
                    <i class="fas fa-upload"></i> 导入数据
                </button>
                <input type="file" id="import-input" accept=".json" style="display: none;">
            </div>
        </div>
    </div>
    
    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>
    
    <!-- 导出模态框 -->
    <div id="export-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%;">
            <h3>导出日记数据</h3>
            <p>您的所有日记数据（包括图片）将以JSON格式导出。请妥善保存此文件。</p>
            <textarea id="export-data" style="width: 100%; height: 200px; margin: 15px 0; padding: 10px; font-family: monospace;"></textarea>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="copy-export" class="btn btn-primary">复制数据</button>
                <button id="close-export" class="btn btn-secondary">关闭</button>
            </div>
        </div>
    </div>

    <script>
        class DiaryApp {
            constructor() {
                this.diaries = [];
                this.currentDiaryId = null;
                this.images = [];
                this.init();
            }
            
            init() {
                this.loadDiaries();
                this.setupEventListeners();
                this.setCurrentDate();
                this.renderDiaryList();
                this.setupTheme();
            }
            
            setupTheme() {
                const themeToggle = document.getElementById('theme-toggle');
                const savedTheme = localStorage.getItem('diary-theme') || 'light';
                
                if (savedTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeToggle.checked = true;
                }
                
                themeToggle.addEventListener('change', () => {
                    if (themeToggle.checked) {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('diary-theme', 'dark');
                    } else {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('diary-theme', 'light');
                    }
                });
            }
            
            setCurrentDate() {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('date-input').value = today;
            }
            
            loadDiaries() {
                const savedDiaries = localStorage.getItem('diaries');
                if (savedDiaries) {
                    this.diaries = JSON.parse(savedDiaries);
                }
                this.updateStats();
            }
            
            saveDiaries() {
                localStorage.setItem('diaries', JSON.stringify(this.diaries));
                this.updateStats();
                this.updateDiaryCount();
            }
            
            updateDiaryCount() {
                document.getElementById('diary-count').textContent = `${this.diaries.length}篇`;
                document.getElementById('total-diaries').textContent = this.diaries.length;
            }
            
            updateStats() {
                let totalImages = 0;
                let totalWords = 0;
                
                this.diaries.forEach(diary => {
                    totalImages += diary.images.length;
                    totalWords += diary.text.length;
                });
                
                document.getElementById('total-images').textContent = totalImages;
                document.getElementById('total-words').textContent = totalWords.toLocaleString();
            }
            
            setupEventListeners() {
                // 保存日记
                document.getElementById('save-btn').addEventListener('click', () => this.saveDiary());
                
                // 清空编辑器
                document.getElementById('clear-btn').addEventListener('click', () => this.clearEditor());
                
                // 删除日记
                document.getElementById('delete-btn').addEventListener('click', () => this.deleteCurrentDiary());
                
                // 搜索日记
                document.getElementById('search-input').addEventListener('input', () => this.searchDiaries());
                
                // 图片上传
                document.getElementById('image-upload-area').addEventListener('click', () => {
                    document.getElementById('image-input').click();
                });
                
                document.getElementById('image-input').addEventListener('change', (e) => {
                    this.handleImageUpload(e.target.files);
                });
                
                // 拖拽上传
                const uploadArea = document.getElementById('image-upload-area');
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.style.borderColor = '#3498db';
                    uploadArea.style.background = 'rgba(52, 152, 219, 0.2)';
                });
                
                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.style.borderColor = '';
                    uploadArea.style.background = '';
                });
                
                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.style.borderColor = '';
                    uploadArea.style.background = '';
                    if (e.dataTransfer.files.length) {
                        this.handleImageUpload(e.dataTransfer.files);
                    }
                });
                
                // 导出数据
                document.getElementById('export-btn').addEventListener('click', () => this.exportData());
                
                // 导入数据
                document.getElementById('import-btn').addEventListener('click', () => {
                    document.getElementById('import-input').click();
                });
                
                document.getElementById('import-input').addEventListener('change', (e) => {
                    this.importData(e.target.files[0]);
                });
                
                // 导出模态框
                document.getElementById('copy-export').addEventListener('click', () => {
                    const exportData = document.getElementById('export-data');
                    exportData.select();
                    document.execCommand('copy');
                    this.showToast('数据已复制到剪贴板');
                });
                
                document.getElementById('close-export').addEventListener('click', () => {
                    document.getElementById('export-modal').style.display = 'none';
                });
                
                // 点击模态框外部关闭
                document.getElementById('export-modal').addEventListener('click', (e) => {
                    if (e.target.id === 'export-modal') {
                        e.target.style.display = 'none';
                    }
                });
            }
            
            handleImageUpload(files) {
                const maxSize = 5 * 1024 * 1024; // 5MB
                const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
                
                for (let file of files) {
                    if (!validTypes.includes(file.type)) {
                        this.showToast(`不支持的文件格式: ${file.name}`);
                        continue;
                    }
                    
                    if (file.size > maxSize) {
                        this.showToast(`图片 ${file.name} 超过5MB限制`);
                        continue;
                    }
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.images.push({
                            name: file.name,
                            data: e.target.result,
                            size: file.size,
                            type: file.type
                        });
                        this.renderImagePreview();
                    };
                    reader.readAsDataURL(file);
                }
                
                document.getElementById('image-input').value = '';
            }
            
            renderImagePreview() {
                const previewContainer = document.getElementById('image-preview');
                previewContainer.innerHTML = '';
                
                this.images.forEach((image, index) => {
                    const imageItem = document.createElement('div');
                    imageItem.className = 'image-preview-item';
                    
                    const img = document.createElement('img');
                    img.src = image.data;
                    img.alt = image.name;
                    
                    const removeBtn = document.createElement('div');
                    removeBtn.className = 'image-remove-btn';
                    removeBtn.innerHTML = '<i class="fas fa-times"></i>';
                    removeBtn.onclick = (e) => {
                        e.stopPropagation();
                        this.images.splice(index, 1);
                        this.renderImagePreview();
                    };
                    
                    imageItem.appendChild(img);
                    imageItem.appendChild(removeBtn);
                    previewContainer.appendChild(imageItem);
                });
            }
            
            saveDiary() {
                const date = document.getElementById('date-input').value;
                const text = document.getElementById('diary-text').value.trim();
                
                if (!date) {
                    this.showToast('请选择日期');
                    return;
                }
                
                if (!text && this.images.length === 0) {
                    this.showToast('日记内容不能为空');
                    return;
                }
                
                const now = new Date().toISOString();
                const diaryData = {
                    id: this.currentDiaryId || Date.now(),
                    date: date,
                    text: text,
                    images: [...this.images],
                    created: this.currentDiaryId ? this.diaries.find(d => d.id === this.currentDiaryId)?.created || now : now,
                    updated: now
                };
                
                if (this.currentDiaryId) {
                    const index = this.diaries.findIndex(d => d.id === this.currentDiaryId);
                    if (index !== -1) {
                        this.diaries[index] = diaryData;
                        this.showToast('日记已更新');
                    }
                } else {
                    this.diaries.unshift(diaryData);
                    this.showToast('日记已保存');
                }
                
                this.saveDiaries();
                this.renderDiaryList();
                this.clearEditor();
            }
            
            clearEditor() {
                this.setCurrentDate();
                document.getElementById('diary-text').value = '';
                document.getElementById('editor-title').innerHTML = '<i class="fas fa-edit"></i> 写日记';
                this.images = [];
                this.renderImagePreview();
                document.getElementById('delete-btn').style.display = 'none';
                this.currentDiaryId = null;
            }
            
            deleteCurrentDiary() {
                if (!this.currentDiaryId) return;
                
                if (confirm('确定要删除这篇日记吗？此操作无法撤销。')) {
                    this.diaries = this.diaries.filter(d => d.id !== this.currentDiaryId);
                    this.saveDiaries();
                    this.renderDiaryList();
                    this.clearEditor();
                    this.showToast('日记已删除');
                }
            }
            
            searchDiaries() {
                const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
                this.renderDiaryList(searchTerm);
            }
            
            renderDiaryList(searchTerm = '') {
                const diaryList = document.getElementById('diary-list');
                
                let filteredDiaries = this.diaries;
                if (searchTerm) {
                    filteredDiaries = this.diaries.filter(diary => 
                        diary.text.toLowerCase().includes(searchTerm) || 
                        diary.date.includes(searchTerm)
                    );
                }
                
                if (filteredDiaries.length === 0) {
                    diaryList.innerHTML = `
                        <div class="empty-state">
                            <i class="far fa-file-alt"></i>
                            <h3>${searchTerm ? '没有找到相关日记' : '还没有日记'}</h3>
                            <p>${searchTerm ? '尝试其他搜索词' : '开始写下您的第一篇日记吧！'}</p>
                        </div>
                    `;
                    return;
                }
                
                let diaryItemsHTML = '';
                filteredDiaries.forEach(diary => {
                    const date = new Date(diary.date);
                    const formattedDate = date.toLocaleDateString('zh-CN', { 
                        year: 'numeric', 
                        month: 'long', 
                        day: 'numeric' 
                    });
                    
                    const previewText = diary.text.length > 100 
                        ? diary.text.substring(0, 100) + '...' 
                        : diary.text || '[无文字内容]';
                    
                    const isActive = this.currentDiaryId === diary.id ? 'active' : '';
                    const hasImages = diary.images.length > 0;
                    
                    diaryItemsHTML += `
                        <div class="diary-item ${isActive}" data-id="${diary.id}">
                            <div class="diary-date">
                                <span>${formattedDate}</span>
                                ${hasImages ? '<i class="fas fa-image"></i>' : ''}
                            </div>
                            <div class="diary-preview">${previewText}</div>
                        </div>
                    `;
                });
                
                diaryList.innerHTML = diaryItemsHTML;
                
                // 添加点击事件
                document.querySelectorAll('.diary-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const diaryId = parseInt(item.getAttribute('data-id'));
                        this.loadDiary(diaryId);
                    });
                });
            }
            
            loadDiary(diaryId) {
                const diary = this.diaries.find(d => d.id === diaryId);
                if (!diary) return;
                
                this.currentDiaryId = diaryId;
                document.getElementById('date-input').value = diary.date;
                document.getElementById('diary-text').value = diary.text;
                document.getElementById('editor-title').innerHTML = '<i class="fas fa-edit"></i> 编辑日记';
                
                this.images = [...diary.images];
                this.renderImagePreview();
                
                document.getElementById('delete-btn').style.display = 'flex';
                
                // 滚动到编辑器顶部
                document.querySelector('.editor-container').scrollIntoView({ behavior: 'smooth' });
            }
            
            exportData() {
                const exportData = {
                    app: '数字日记本',
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    diaries: this.diaries
                };
                
                const exportStr = JSON.stringify(exportData, null, 2);
                document.getElementById('export-data').value = exportStr;
                document.getElementById('export-modal').style.display = 'flex';
                
                // 自动选择文本
                document.getElementById('export-data').select();
            }
            
            importData(file) {
                if (!file) return;
                
                if (!file.name.endsWith('.json')) {
                    this.showToast('请选择JSON文件');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        
                        if (!data.diaries || !Array.isArray(data.diaries)) {
                            throw new Error('无效的数据格式');
                        }
                        
                        if (confirm(`将导入 ${data.diaries.length} 篇日记。这会覆盖现有数据吗？`)) {
                            this.diaries = data.diaries;
                            this.saveDiaries();
                            this.renderDiaryList();
                            this.clearEditor();
                            this.showToast(`成功导入 ${data.diaries.length} 篇日记`);
                        }
                    } catch (error) {
                        this.showToast('导入失败: 文件格式错误');
                    }
                };
                
                reader.readAsText(file);
                document.getElementById('import-input').value = '';
            }
            
            showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            const app = new DiaryApp();
            
            // 添加示例数据（如果第一次使用）
            if (!localStorage.getItem('diaries')) {
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                
                const exampleDiaries = [
                    {
                        id: 1,
                        date: today.toISOString().split('T')[0],
                        text: '欢迎使用数字日记本！\n\n这是一个功能完整的日记应用，支持：\n✓ 添加文字日记\n✓ 上传图片\n✓ 深色/浅色主题\n✓ 数据导入导出\n✓ 本地存储\n\n您的所有数据都保存在浏览器本地，不会上传到任何服务器。\n\n点击左侧的日记可以查看和编辑，点击"清空"可以开始新的日记。',
                        images: [],
                        created: today.toISOString(),
                        updated: today.toISOString()
                    },
                    {
                        id: 2,
                        date: yesterday.toISOString().split('T')[0],
                        text: '这是一个示例日记，展示了长文本的显示效果。日记应用会自动截断过长的文本，并在列表中显示预览。点击日记可以查看完整内容并进行编辑。\n\n您可以在日记中添加任意多的文字和图片，所有内容都会自动保存。',
                        images: [],
                        created: yesterday.toISOString(),
                        updated: yesterday.toISOString()
                    }
                ];
                
                localStorage.setItem('diaries', JSON.stringify(exampleDiaries));
                app.loadDiaries();
                app.renderDiaryList();
            }
        });
    </script>
</body>
</html>
